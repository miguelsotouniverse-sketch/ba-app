<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Pagos · Dr. Miguel Soto Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* Fallback fonts if Google Fonts don't load (file:// context) */
  @font-face { font-family: 'Cormorant Garamond'; src: local('Georgia'); }
  @font-face { font-family: 'DM Sans'; src: local('-apple-system'), local('Helvetica Neue'), local('Arial'); }
</style>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #c8a96e;
    --accent2: #8b6f3e;
    --text: #e8e4dc;
    --muted: #6b6880;
    --success: #5a9e7a;
    --error: #c05a5a;
    --user-bubble: #1e1e2e;
    --bot-bubble: #171724;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  header {
    width: 100%;
    max-width: 680px;
    padding: 32px 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    border-bottom: 1px solid var(--border);
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }

  .logo-mark span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent);
    font-weight: 300;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }

  header p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Progress bar */
  .progress-bar-wrap {
    width: 100%;
    max-width: 680px;
    padding: 16px 24px 0;
  }

  .progress-steps {
    display: flex;
    gap: 4px;
  }

  .step-dot {
    height: 2px;
    flex: 1;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.4s;
  }

  .step-dot.done { background: var(--accent); }
  .step-dot.active { background: var(--accent2); }

  /* Chat area */
  #chat {
    width: 100%;
    max-width: 680px;
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    margin-top: 2px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: var(--bg);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
  }

  .avatar.user {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2e2e42;
    border-top-right-radius: 4px;
    color: var(--text);
    text-align: right;
  }

  /* Options chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .chip {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.06);
  }

  .chip.selected {
    border-color: var(--accent);
    background: rgba(200,169,110,0.12);
    color: var(--accent);
  }

  /* Typing indicator */
  .typing-dots {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* Input area */
  #input-area {
    width: 100%;
    max-width: 680px;
    padding: 16px 24px 28px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    border-top: 1px solid var(--border);
  }

  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 12px 16px;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #user-input:focus { border-color: var(--accent2); }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #send-btn:hover { background: var(--accent2); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #send-btn svg { color: var(--bg); }

  /* Summary card */
  .summary-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.8;
  }

  .summary-card .field {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .summary-card .field:last-child { border-bottom: none; }

  .summary-card .label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .summary-card .value {
    color: var(--text);
    text-align: right;
    font-weight: 400;
  }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    margin-top: 8px;
  }

  .status-badge.ok {
    background: rgba(90,158,122,0.15);
    border: 1px solid rgba(90,158,122,0.3);
    color: var(--success);
  }

  .status-badge.err {
    background: rgba(192,90,90,0.15);
    border: 1px solid rgba(192,90,90,0.3);
    color: var(--error);
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Sheets link */
  a.sheets-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    border-bottom: 1px solid rgba(200,169,110,0.3);
    padding-bottom: 1px;
    transition: border-color 0.2s;
  }

  a.sheets-link:hover { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo-mark"><span>M</span></div>
  <h1>Dr. Miguel Soto Universe</h1>
  <p>Registro de Pagos</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-steps" id="progress-steps"></div>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Escribe aquí…" rows="1"></textarea>
  <button id="send-btn" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const SHEET_ID = "1AjA0lsYOtXoRe16UuMNWWo_p2WXxFzM0zXJUqLc-BrA";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}`;

// ─── STEPS ─────────────────────────────────────────────────
const STEPS = [
  "fecha", "paciente", "lineaGeneral", "tratamiento", "area",
  "fullPrice", "monto", "medicoTitular", "operativo", "prospecta",
  "cierra", "procedencia", "tipoPago", "medioPago", "efectuoCobro",
  "factura", "observaciones"
];

const STEP_LABELS = {
  fecha: "Fecha",
  paciente: "Paciente",
  lineaGeneral: "Línea General",
  tratamiento: "Tratamiento / Servicio",
  area: "Área(s)",
  fullPrice: "Full Price",
  monto: "Monto cobrado",
  medicoTitular: "Médico Titular",
  operativo: "Operativo",
  prospecta: "Prospecta",
  cierra: "Cierra",
  procedencia: "Procedencia",
  tipoPago: "Tipo de Pago",
  medioPago: "Medio de Validación",
  efectuoCobro: "Efectuó Cobro",
  factura: "Factura #",
  observaciones: "Observaciones"
};

const OPTIONS = {
  lineaGeneral: ["Cirugía", "Energía", "Inyectables", "Capilar", "Skin Tightening", "Consulta", "Otro"],
  tipoPago: ["Anticipo", "Liquidación", "Pago Total", "Consulta", "Otro"],
  medioPago: ["Efectivo", "TDD", "TDC", "Transferencia", "SPEI", "No aplica"],
  efectuoCobro: ["Valeria Lima", "Anahí Alvarado", "Susana Palacios", "Miguel Soto", "Otro"],
  medicoTitular: ["Miguel Soto", "Laura Tagle", "Otro"]
};

const PROMPTS = {
  fecha: "¿Cuál es la **fecha** del pago? (ej. 19/05/2026 — o escribe "hoy")",
  paciente: "¿Cuál es el **nombre completo** del paciente?",
  lineaGeneral: "¿A qué **línea** corresponde?",
  tratamiento: "¿Cuál es el **tratamiento o servicio**? (ej. Qx Body500, Endolifting, Consulta valoración…)",
  area: "¿Qué **área(s)** se tratan? (o escribe "N/A" si no aplica)",
  fullPrice: "¿Cuál es el **full price** del tratamiento? (ej. $35,000)",
  monto: "¿Cuánto se cobró en esta transacción? (ej. $10,000)",
  medicoTitular: "¿Quién es el **médico titular**?",
  operativo: "¿Quién fue el **operativo**? (o "No aplica")",
  prospecta: "¿Quién **prospecta**? (o "No aplica")",
  cierra: "¿Quién **cierra**? (o "No aplica")",
  procedencia: "¿Cuál es la **procedencia** del paciente? (ej. Facebook, Instagram, Referido, No aplica)",
  tipoPago: "¿Qué **tipo de pago** es?",
  medioPago: "¿Cuál fue el **medio de pago**?",
  efectuoCobro: "¿Quién **efectuó el cobro**?",
  factura: "¿Número de **factura**? (o escribe "No" si no aplica)",
  observaciones: "¿Alguna **observación** adicional? (o escribe "—" si no hay)"
};

// ─── STATE ──────────────────────────────────────────────────
let stepIndex = 0;
let record = {};
let awaitingConfirmation = false;
let saving = false;

// ─── DOM ────────────────────────────────────────────────────
const chat = document.getElementById("chat");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const progressWrap = document.getElementById("progress-steps");

// ─── PROGRESS ───────────────────────────────────────────────
function renderProgress() {
  progressWrap.innerHTML = "";
  STEPS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "step-dot" + (i < stepIndex ? " done" : i === stepIndex ? " active" : "");
    progressWrap.appendChild(d);
  });
}

// ─── CHAT HELPERS ───────────────────────────────────────────
function addMsg(role, content, html = false) {
  const msg = document.createElement("div");
  msg.className = `msg ${role}`;

  const av = document.createElement("div");
  av.className = `avatar ${role}`;
  av.textContent = role === "bot" ? "M" : "→";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (html) {
    bubble.innerHTML = content;
  } else {
    bubble.innerHTML = content
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br>");
  }

  msg.appendChild(av);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addChips(options, onSelect) {
  const wrap = document.createElement("div");
  wrap.className = "chips";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = opt;
    btn.onclick = () => {
      wrap.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
      btn.classList.add("selected");
      setTimeout(() => {
        wrap.remove();
        onSelect(opt);
      }, 180);
    };
    wrap.appendChild(btn);
  });
  const lastMsg = chat.lastElementChild;
  if (lastMsg) lastMsg.querySelector(".bubble").appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const msg = document.createElement("div");
  msg.className = "msg bot";
  msg.id = "typing";
  msg.innerHTML = `
    <div class="avatar bot">M</div>
    <div class="bubble"><div class="typing-dots">
      <span></span><span></span><span></span>
    </div></div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

// ─── FLOW ────────────────────────────────────────────────────
function askCurrentStep() {
  const step = STEPS[stepIndex];
  renderProgress();
  setTimeout(() => {
    addMsg("bot", PROMPTS[step]);
    if (OPTIONS[step]) {
      addChips(OPTIONS[step], answer => handleUserAnswer(answer));
      input.disabled = true;
      sendBtn.disabled = true;
    } else {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }, stepIndex === 0 ? 0 : 300);
}

function handleUserAnswer(answer) {
  const step = STEPS[stepIndex];

  // Auto-format fecha
  if (step === "fecha") {
    if (answer.toLowerCase() === "hoy") {
      const now = new Date();
      answer = `${now.getDate().toString().padStart(2,"0")}/${(now.getMonth()+1).toString().padStart(2,"0")}/${now.getFullYear()}`;
    }
  }

  addMsg("user", answer);
  record[step] = answer;
  stepIndex++;

  if (stepIndex >= STEPS.length) {
    showSummary();
  } else {
    askCurrentStep();
  }
}

function showSummary() {
  renderProgress();
  addMsg("bot", "Perfecto. Aquí está el resumen del registro:");

  setTimeout(() => {
    const card = buildSummaryCard();
    const msgEl = document.createElement("div");
    msgEl.className = "msg bot";
    msgEl.innerHTML = `<div class="avatar bot">M</div>`;
    msgEl.appendChild(card);
    chat.appendChild(msgEl);
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
      addMsg("bot", "¿Confirmas que los datos son correctos?\n\nEscribe **sí** para guardar en Google Sheets, o **no** para empezar de nuevo.");
      awaitingConfirmation = true;
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }, 400);
  }, 300);
}

function buildSummaryCard() {
  const card = document.createElement("div");
  card.className = "bubble";
  const inner = document.createElement("div");
  inner.className = "summary-card";

  STEPS.forEach(step => {
    const row = document.createElement("div");
    row.className = "field";
    row.innerHTML = `
      <span class="label">${STEP_LABELS[step]}</span>
      <span class="value">${record[step] || "—"}</span>`;
    inner.appendChild(row);
  });

  card.appendChild(inner);
  return card;
}

// ─── SAVE TO SHEETS (via Google Apps Script) ─────────────────
// Para activar guardado automático en Sheets:
// 1. Ve a script.google.com → Nuevo proyecto
// 2. Pega este código:
//    function doPost(e) {
//      var d = JSON.parse(e.postData.contents);
//      SpreadsheetApp.openById("1AjA0lsYOtXoRe16UuMNWWo_p2WXxFzM0zXJUqLc-BrA").getSheets()[0].appendRow(d.row);
//      return ContentService.createTextOutput("OK");
//    }
// 3. Implementar → Nueva implementación → App web
//    Ejecutar como: Yo | Acceso: Cualquier persona
// 4. Copia la URL y pégala en APPS_SCRIPT_URL abajo

const APPS_SCRIPT_URL = ""; // ← pega tu URL aquí

async function saveToSheets() {
  saving = true;
  input.disabled = true;
  sendBtn.disabled = true;
  addTyping();

  const csvRow = STEPS.map(s => '"' + (record[s] || "").replace(/"/g, '""') + '"').join(",");
  const rowData = STEPS.map(s => record[s] || "");

  if (!APPS_SCRIPT_URL) {
    removeTyping();
    showFallback(csvRow);
    saving = false;
    return;
  }

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ row: rowData })
    });
    removeTyping();
    showSuccess();
  } catch (err) {
    removeTyping();
    showFallback(csvRow);
  }
  saving = false;
}

function showSuccess() {
  const bubble = addMsg("bot", "", true);
  bubble.innerHTML = `
    <div>¡Registro guardado correctamente en Google Sheets!</div>
    <div class="status-badge ok"><span class="dot"></span> Guardado exitoso</div>
    <br>
    <a class="sheets-link" href="${SHEET_URL}" target="_blank">→ Ver hoja de registro</a>
    <br><br>
    <div style="font-size:13px;color:var(--muted)">¿Deseas registrar otro pago? Escribe <strong style="color:var(--accent)">nuevo</strong>.</div>`;
  awaitingConfirmation = false;
  input.disabled = false;
  sendBtn.disabled = false;
}

function showFallback(csvRow) {
  const bubble = addMsg("bot", "", true);
  bubble.innerHTML = `
    <div>El registro está listo. Por favor <a class="sheets-link" href="${SHEET_URL}" target="_blank">abre el Google Sheet</a> y pega esta fila en la siguiente línea disponible:</div>
    <br>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:11px;font-family:monospace;word-break:break-all;color:var(--accent);line-height:1.6;">${csvRow}</div>
    <br>
    <div style="font-size:13px;color:var(--muted)">¿Deseas registrar otro pago? Escribe <strong style="color:var(--accent)">nuevo</strong>.</div>`;
  awaitingConfirmation = false;
  input.disabled = false;
  sendBtn.disabled = false;
}

function resetFlow() {
  stepIndex = 0;
  record = {};
  awaitingConfirmation = false;
  chat.innerHTML = "";
  addMsg("bot", "Perfecto, iniciamos un nuevo registro.");
  setTimeout(askCurrentStep, 400);
}

// ─── SEND ────────────────────────────────────────────────────
function sendMessage() {
  const val = input.value.trim();
  if (!val || saving) return;
  input.value = "";
  input.style.height = "44px";

  if (awaitingConfirmation) {
    const lower = val.toLowerCase();
    if (lower === "sí" || lower === "si" || lower === "yes" || lower === "confirmar" || lower === "confirmo") {
      addMsg("user", val);
      awaitingConfirmation = false;
      saveToSheets();
    } else if (lower === "no" || lower === "nuevo") {
      addMsg("user", val);
      setTimeout(resetFlow, 300);
    } else {
      addMsg("user", val);
      addMsg("bot", "Escribe **sí** para confirmar y guardar, o **no** para empezar de nuevo.");
    }
    return;
  }

  if (val.toLowerCase() === "nuevo") {
    resetFlow();
    return;
  }

  handleUserAnswer(val);
}

// ─── INIT ────────────────────────────────────────────────────
function init() {
  sendBtn.addEventListener("click", sendMessage);

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener("input", () => {
    sendBtn.disabled = input.value.trim() === "";
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  renderProgress();
  addMsg("bot", "Buen día. Soy tu asistente de registro de pagos para **Dr. Miguel Soto Universe**.\n\nVamos a capturar paso a paso los datos de esta transacción.");
  setTimeout(askCurrentStep, 600);
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
</script>
</body>
</html>
